name: Deploy to drift.kineticgain.com

# Node/Vite/React -> Hostinger FTP at /drift/
# workflow_dispatch-only: subdomain isn't in Hostinger DNS yet; manual trigger
# once Miz provisions via hPanel.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-trust-assertion-drift-monitor
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build + FTP-sync to drift.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: |
          if npm run | grep -q "^  prerender$"; then
            npm run prerender
          else
            npm run build
          fi

      - name: Verify build output
        run: |
          if [ -d "site" ]; then DEPLOY_DIR="site"
          elif [ -d "dist-static" ]; then DEPLOY_DIR="dist-static"
          elif [ -d "public" ]; then DEPLOY_DIR="public"
          elif [ -d "out" ]; then DEPLOY_DIR="out"
          elif [ -d "_site" ]; then DEPLOY_DIR="_site"
          elif [ -d "dist" ]; then DEPLOY_DIR="dist"
          elif [ -d "build" ]; then DEPLOY_DIR="build"
          else
            echo "FAIL: no site/, dist-static/, public/, out/, _site/, dist/, or build/ produced"
            exit 1
          fi
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          test -f "$DEPLOY_DIR/index.html" || (echo "FAIL: $DEPLOY_DIR/index.html missing" && exit 1)

      - name: FTP Deploy (attempt 1)
        id: ftp_first
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./${{ env.DEPLOY_DIR }}/
          server-dir: /drift/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**

      - name: Sleep before retry (let FTP cap drain)
        if: steps.ftp_first.outcome == 'failure'
        run: sleep 60

      - name: Retry FTP Deploy if first attempt failed
        if: steps.ftp_first.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./${{ env.DEPLOY_DIR }}/
          server-dir: /drift/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
